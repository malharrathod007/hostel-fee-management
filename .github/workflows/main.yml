name: Laravel CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  PHP_VERSION: "8.2"
  DEPLOY_PATH: /var/www/html/hostel_fees

jobs:
  build:
    name: Build Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: public/build/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}          # Pass variables to the remote shell
          envs: DEPLOY_PATH,PHP_VERSION,DB_HOST,DB_PORT,DB_DATABASE,DB_USERNAME,DB_PASSWORD
          script: |
            set -e
            echo "Starting Deployment to ${DEPLOY_PATH}"
            
            cd ${DEPLOY_PATH}

            # 1. Maintenance Mode
            php artisan down --retry=60 || true

            # 2. Update Source
            git fetch origin main
            git reset --hard origin/main

            # 3. Update Environment (Silent Injection)
            sed -i "s|^DB_HOST=.*|DB_HOST=${DB_HOST}|" .env
            sed -i "s|^DB_DATABASE=.*|DB_DATABASE=${DB_DATABASE}|" .env
            sed -i "s|^DB_USERNAME=.*|DB_USERNAME=${DB_USERNAME}|" .env
            sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${DB_PASSWORD}|" .env

            # 4. Install PHP Dependencies
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            # 5. Database & Optimization
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # 6. File System
            php artisan storage:link || true
            chmod -R 775 storage bootstrap/cache

            # 7. Process Management (PM2)
            if pm2 describe ecosystem.config.js > /dev/null 2>&1; then
              pm2 restart ecosystem.config.js
            else
              pm2 start ecosystem.config.js
            fi
            pm2 save

            # 8. Finalize
            php artisan up
            sudo systemctl reload php${PHP_VERSION}-fpm || true
            
            echo "✅ Deployment Successful!"
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
